<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#FFFFFF" />
  
  <g transform="translate(60, 60) scale(0.9)">
    <!-- Timer/Stopwatch in Background -->
    <g transform="translate(100, 20)">
      <!-- Outer Circle -->
      <path d="M140 20 A120 120 0 1 1 139.9 20" fill="none" stroke="#333333" stroke-width="14" />
      
      <!-- Center Top Knob -->
      <path d="M125 -10 H155 V15 H125 Z" fill="#333333" />
      <path d="M115 -20 H165 V-10 H115 Z" fill="#333333" />
      
      <!-- Left Top Knob -->
      <g transform="rotate(-40, 60, 50)">
        <path d="M45 35 H75 V60 H45 Z" fill="#333333" />
      </g>
      
      <!-- Right Top Knob -->
      <g transform="rotate(40, 220, 50)">
        <path d="M205 35 H235 V60 H205 Z" fill="#333333" />
      </g>
      
      <!-- Minute/Second Marks -->
      <path d="M140 20 V40" stroke="#333333" stroke-width="8" stroke-linecap="round" />
      
      <!-- Clock Hand -->
      <path d="M140 140 L220 140" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" />
    </g>

    <!-- Speed Lines (Orange) -->
    <g transform="translate(80, 210)">
      <rect x="0" y="0" width="110" height="18" rx="9" fill="#F59E0B" />
      <rect x="60" y="40" width="90" height="18" rx="9" fill="#F59E0B" />
      <rect x="-40" y="80" width="130" height="18" rx="9" fill="#F59E0B" />
      <rect x="50" y="120" width="80" height="18" rx="9" fill="#F59E0B" />
    </g>

    <!-- Running Person (Silhoutte) -->
    <path d="M240 180 C240 160 260 140 280 140 C300 140 320 160 320 180 C320 200 300 220 280 220 C260 220 240 200 240 180 Z" fill="#333333" /> <!-- Head -->
    <path d="M300 170 L380 170 L380 185 L300 185 Z" fill="#333333" /> <!-- Cap Bill -->
    
    <path d="M280 220 L270 330 L360 350 L280 220 Z" fill="#333333" /> <!-- Torso -->
    
    <!-- Box being carried -->
    <rect x="340" y="240" width="100" height="100" rx="4" fill="#333333" />
    
    <!-- Arms -->
    <path d="M290 250 L350 310 L310 330 L260 270 Z" fill="#333333" />
    <path d="M350 300 L430 300 L430 330 L350 330 Z" fill="#333333" /> <!-- Thumb area -->

    <!-- Legs in Motion -->
    <path d="M275 330 L180 430 L220 450 L310 350 Z" fill="#333333" /> <!-- Back leg extension -->
    <path d="M300 330 L350 450 L400 450 L340 330 Z" fill="#333333" /> <!-- Front leg stance -->
  </g>
</svg>
